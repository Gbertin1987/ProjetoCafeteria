

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Destaques da semana - Checkpoint Coffee</title>
  <link rel="stylesheet" href="stylecardapio.css">
</head>
<body>

<button class="btn-area" onclick="irArea()">🏪 Nossa Loja Física</button>

<div class="container">
  <h1>Destaques da semana</h1>
  <button onclick="irCarrinho()">🛒 Ver Carrinho</button>

    </div>

	<div class="card">
      <img src="img/cafe9.jpg">

      <p>R$ 13</p>
      <button onclick="addCarrinho(8,'Café 8',13)">Adicionar</button>
    </div>

  </div>
</div>

<script>
let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];

function addCarrinho(id,nome,preco){
  const item = carrinho.find(i=>i.id===id);

  if(item){
    item.qtd++;
  } else {
    carrinho.push({id,nome,preco,qtd:1});
  }

  localStorage.setItem('carrinho',JSON.stringify(carrinho));
  alert('Item adicionado ao carrinho!');
}

function irCarrinho(){
  window.location.href = 'carrinho.html';
}
function irArea(){
  window.location.href = 'nossaarea.html';
}
</script>
