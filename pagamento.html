
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pagamento - Checkpoint Coffee</title>
  <link rel="stylesheet" href="pagamento.css">
</head>
<body>

<div class="container">
  <h1>💳 Pagamento</h1>

  <div class="pix-box">
    <h2>Escaneie o QR Code</h2>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=checkpointcoffee@pix.com">
    <p>Chave PIX: checkpointcoffee@pix.com</p>
  </div>

  <form onsubmit="finalizarCompra(event)">
    <h2>📦 Endereço de Entrega</h2>

    <input type="text" placeholder="Nome completo" required>
    <input type="text" placeholder="Rua" required>
    <input type="text" placeholder="Número" required>
    <input type="text" placeholder="Bairro" required>
    <input type="text" placeholder="Cidade" required>
    <input type="text" placeholder="CEP" required>

    <button type="submit">Confirmar Pagamento</button>
  </form>

</div>

<script>
function finalizarCompra(e){
  e.preventDefault();

  alert("Pagamento confirmado! Pedido em preparo ☕");

  localStorage.removeItem('carrinho');

  setTimeout(() => {
    window.location.href = "cardapio.html";
  }, 1500);
}
</script>

</body>
</html>
